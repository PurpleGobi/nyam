<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nyam — 목업 허브</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #faf9f7 0%, #f0ece6 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    color: #3D3833;
    padding: 60px 24px 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .hub-header {
    text-align: center;
    margin-bottom: 52px;
  }

  .hub-logo {
    font-family: 'Comfortaa', cursive;
    font-size: 40px;
    font-weight: 700;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #FF6038, #8B7396);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .hub-subtitle-line {
    font-size: 13px;
    color: #B5AFA8;
    font-weight: 500;
    letter-spacing: 0.04em;
    margin-bottom: 6px;
  }

  .hub-title {
    font-size: 28px;
    font-weight: 800;
    color: #3D3833;
    letter-spacing: -0.5px;
    line-height: 1.25;
  }

  .hub-desc {
    font-size: 14px;
    color: #8C8580;
    margin-top: 10px;
    line-height: 1.7;
  }

  .cards-grid {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .page-card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: #ffffff;
    border-radius: 16px;
    padding: 20px 24px;
    box-shadow: 0 2px 12px rgba(61,56,51,0.07), 0 0 0 1px rgba(61,56,51,0.05);
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }

  .page-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(61,56,51,0.12), 0 0 0 1px rgba(61,56,51,0.06);
  }

  .page-card:active {
    transform: translateY(0px);
    box-shadow: 0 2px 8px rgba(61,56,51,0.08);
  }

  .card-icon {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .icon-onboarding { background: linear-gradient(135deg, #FFF0EB, #FFD8CC); }
  .icon-home       { background: linear-gradient(135deg, #FFF4EF, #FFDDCF); }
  .icon-detail     { background: linear-gradient(135deg, #F0F4FF, #DDE5FF); }
  .icon-profile    { background: linear-gradient(135deg, #F3F0F8, #E0D8EF); }
  .icon-bubbles    { background: linear-gradient(135deg, #F0FAF4, #CCF0D8); }
  .icon-settings   { background: linear-gradient(135deg, #F5F5F5, #E8E8E8); }

  .card-body {
    flex: 1;
  }

  .card-name {
    font-size: 17px;
    font-weight: 700;
    color: #3D3833;
    margin-bottom: 3px;
  }

  .card-desc {
    font-size: 13px;
    color: #8C8580;
    line-height: 1.5;
  }

  .card-arrow {
    font-size: 18px;
    color: #C17B5E;
    flex-shrink: 0;
    font-weight: 600;
  }

  .divider {
    width: 100%;
    max-width: 480px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #E8E4DF, transparent);
    margin: 8px 0;
  }

  .hub-footer {
    margin-top: 48px;
    text-align: center;
    font-size: 12px;
    color: #C5BFB8;
    line-height: 1.8;
  }

  .accent { color: #FF6038; font-weight: 700; }
</style>
</head>
<body>

<div class="hub-header">
  <div class="hub-logo">nyam</div>
  <div class="hub-subtitle-line">프로토타입 페이지 목록</div>
  <div class="hub-title">목업 허브</div>
  <div class="hub-desc">각 페이지를 클릭해서 프로토타입을 탐색하세요</div>
</div>

<div class="cards-grid">

  <a class="page-card" href="onboarding.html">
    <div class="card-icon icon-onboarding">🚀</div>
    <div class="card-body">
      <div class="card-name">온보딩</div>
      <div class="card-desc">로그인 → 지역선택 → 취향설정</div>
    </div>
    <div class="card-arrow">→</div>
  </a>

  <a class="page-card" href="01_home.html">
    <div class="card-icon icon-home">🏠</div>
    <div class="card-body">
      <div class="card-name">홈</div>
      <div class="card-desc">피드 · 기록 · 발견</div>
    </div>
    <div class="card-arrow">→</div>
  </a>

  <div class="divider"></div>

  <a class="page-card" href="02_detail_restaurant.html">
    <div class="card-icon icon-detail">🍽️</div>
    <div class="card-body">
      <div class="card-name">식당 상세</div>
      <div class="card-desc">식당 상세 페이지</div>
    </div>
    <div class="card-arrow">→</div>
  </a>

  <a class="page-card" href="02_detail_wine.html">
    <div class="card-icon icon-detail">🍷</div>
    <div class="card-body">
      <div class="card-name">와인 상세</div>
      <div class="card-desc">와인 상세 페이지</div>
    </div>
    <div class="card-arrow">→</div>
  </a>

  <a class="page-card" href="03_profile.html">
    <div class="card-icon icon-profile">👤</div>
    <div class="card-body">
      <div class="card-name">프로필</div>
      <div class="card-desc">프로필 · 버블 · 알림</div>
    </div>
    <div class="card-arrow">→</div>
  </a>

  <a class="page-card" href="04_bubbles.html">
    <div class="card-icon icon-bubbles">🫧</div>
    <div class="card-body">
      <div class="card-name">버블</div>
      <div class="card-desc">버블 피드 · 생성 · 설정</div>
    </div>
    <div class="card-arrow">→</div>
  </a>

  <a class="page-card" href="05_settings.html">
    <div class="card-icon icon-settings">⚙️</div>
    <div class="card-body">
      <div class="card-name">설정</div>
      <div class="card-desc">앱 설정</div>
    </div>
    <div class="card-arrow">→</div>
  </a>

</div>

<div class="hub-footer">
  <span class="accent">nyam</span> v2 — 인터랙티브 목업<br>
  개발 문서와 함께 사용하세요
</div>

</body>
</html>
